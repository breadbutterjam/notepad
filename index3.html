<!DOCTYPE html>
<html>
<head>
	<title>Notepad</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<!-- <script type="text/javascript" src="jQuery.js"></script> -->
	<script type="text/javascript" src="notepad.js"></script>
	<style>
		body{
			margin: 0px;
		}

        .handCursor{
            cursor: pointer;
        }

		.darkMode{
			background-color:black;
		}
		.counts{
			/* text-align: center; */
			/* padding-left: 20px; */
			font-family: monospace;
			font-size: 1.27em;
			position: relative;
			float: left;
		}

		.flx{
			display: flex;
		}

		.buttonHolder{
			display: flex;
			float: right;
			
			/* flex-direction: row-reverse; */
		}

		.darkMode.notepadMain{
			color: #FEFEFE;
		}
		
        .notepadMain{
			border: 1px solid lightgray;
			/* border: 1px solid black; */
			min-height: 20vh;
			height: fit-content;
			/* width: 80vw; */
			margin: auto;
			font-family: sans-serif;
			padding: 10px;
			margin-top: 25px;
			/* background-color: bisque; */
			border-radius: 4px;
		}

		.notepadMain:focus{
			border: 1px solid lightgray;
		}
		.mainContainer{
			/* border: 1px solid red; */
			border: 1px solid transparent;
			/* background-color: lightgray; */
			margin: 20px;
		}
		.header_buttons{
			padding-left: 10px;
			text-decoration: underline;
            cursor: pointer;
			/* padding-right: 10px; */
		}
		.CharCount
		{
			padding-right: 8px;
		}

        .zenmodeadded{
            max-width: 500px;
            margin: auto;
        }

        #notepad.nocursor.darkMode{
            text-shadow: 0px 0px 0px #fff;
        }
        #notepad.nocursor{
            color: transparent;
            text-shadow: 0px 0px 0px #000;
        }

        .fullFocus:focus-visible{
           outline: 1px solid transparent;
            border: none;

        }
		/* .header_buttons:hover{
			color: blue;
		}
 */
		.footerFontStyling{
			font-size: 0.7em;
			margin-top: 0.2em;
			margin-bottom: 0.2em;
			padding-right: 2em;
			font-family: monospace;
		}
		.headerHolder,.footer
		{
			color: lightgrey;
			justify-content: space-between;
		}

    </style>
</head>
<body onload="onBodyLoad()" class="modeChanger">
<!-- <body> -->
	<div class="mainContainer">
		<div class="headerHolder flx">
			<!-- <div class="counts">0c 0w</div> -->
			
			<div class="flx">
				<div class="counts"><span class="CharCount">0c</span><span class="WordCount">0w</span></div>
			</div>	
			
			<div class="buttonHolder flx">
			
				<div style="padding-right: 20px;"><input id="cbCursorLessTyping" type="checkbox"><label for="cbCursorLessTyping">ghost cursor</label></div>
				<div id="save" class="header_buttons">save</div>
				<div id="clear" class="header_buttons">clear</div>
				<div id="load" class="header_buttons">load</div>
				<div id="switchmode" class="header_buttons">switch mode</div>
				<div id="copytext" class="header_buttons">copy</div>
				<div id="zenmode" class="header_buttons">zen mode</div>
			</div>
			
			
		</div>
		<div id="notepad" contenteditable="true" class="modeChanger notepadMain"></div>
		<div class="footer flx">
			<div class="footerFontStyling autosaveToggle">turn autosave ON</div>
			<div class="footerFontStyling flx">last saved at<span id="last_saved_count"></span></div>
		</div>
	</div>
	
</body>
</html>
